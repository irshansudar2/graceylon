<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 100" class="brand-logo-svg">
  <defs>
    <!-- Importing Playfair Display for perfect font rendering within SVG -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&amp;display=swap');
      .logo-text-gr {
        font-family: 'Playfair Display', serif;
        font-size: 58px;
        font-style: italic;
        fill: #ffffff;
      }
      .logo-text-a {
        font-family: 'Playfair Display', serif;
        font-size: 58px;
        font-style: italic;
        fill: #e52e2e;
        font-weight: 700;
      }
      .logo-text-ceylon {
        font-family: 'Playfair Display', serif;
        font-size: 62px;
        font-weight: 700;
        fill: #ffffff;
        letter-spacing: 5px;
      }
      .logo-text-tm {
        font-family: 'Montserrat', sans-serif;
        font-size: 10px;
        font-weight: 700;
        fill: #ffffff;
      }
      .sri-lanka-map {
        fill: #00d2c4;
        filter: drop-shadow(0 0 3px rgba(0, 210, 196, 0.4));
      }
    </style>
  </defs>

  <!-- Logo text "gr" -->
  <text x="20" y="70" class="logo-text-gr">gr</text>
  
  <!-- Red accented "á" -->
  <text x="74" y="70" class="logo-text-a">á</text>

  <!-- Logo text "CEYL" -->
  <text x="115" y="70" class="logo-text-ceylon">CEYL</text>

  <!-- Custom Styled "O" with Sri Lanka inside -->
  <g transform="translate(306, 20)">
    <!-- Perfect Serif O character using paths for 100% font independence -->
    <path d="M 31,50 C 13.8,50 0,38.7 0,25 C 0,11.2 13.8,0 31,0 C 48.2,0 62,11.2 62,25 C 62,38.7 48.2,50 31,50 Z M 31,45.5 C 43.6,45.5 53.8,36.3 53.8,25 C 53.8,13.7 43.6,4.5 31,4.5 C 18.4,4.5 8.2,13.7 8.2,25 C 8.2,36.3 18.4,45.5 31,45.5 Z" fill="#ffffff" />
    
    <!-- Sri Lanka Silhouette Map placed perfectly inside the O -->
    <!-- Teardrop shape with detailed coast contours -->
    <path class="sri-lanka-map" d="M 33.5, 12.0
             C 32.5, 13.5 31.8, 15.2 31.5, 16.8
             C 31.2, 18.2 31.4, 19.8 32.0, 21.2
             C 32.6, 22.8 33.5, 24.3 34.2, 25.8
             C 34.8, 27.2 35.1, 28.8 34.6, 30.2
             C 34.2, 31.5 33.1, 32.5 31.8, 33.2
             C 30.2, 34.0 28.5, 33.8 27.0, 32.8
             C 25.8, 32.0 25.1, 30.6 24.8, 29.2
             C 24.5, 27.6 24.0, 25.8 24.5, 24.2
             C 25.0, 22.5 26.2, 21.0 27.0, 19.5
             C 27.8, 17.8 28.2, 16.0 28.8, 14.2
             C 29.3, 12.5 30.2, 10.8 31.5, 9.8
             C 32.5, 9.0 33.8, 10.2 33.5, 12.0 Z" />
  </g>

  <!-- Logo text "N" -->
  <text x="375" y="70" class="logo-text-ceylon">N</text>

  <!-- Trade Mark TM -->
  <text x="430" y="40" class="logo-text-tm">TM</text>
</svg>
